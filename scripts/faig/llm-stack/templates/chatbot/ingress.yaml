{{- if and .Values.chatbot.enabled .Values.chatbot.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.chatbot.name }}
  namespace: {{ .Values.chatbot.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.chatbot.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.chatbot.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.chatbot.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.chatbot.name }}
                port:
                  number: {{ .Values.chatbot.service.port }}
{{- end }}
