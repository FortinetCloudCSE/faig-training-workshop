{{- if .Values.chatbot.enabled }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.chatbot.name }}-secrets
  namespace: {{ .Values.chatbot.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
stringData:
  LLM_API_KEY: {{ .Values.chatbot.secrets.llmApiKey | quote }}
  {{- /* Quoted to match the Azure manifest's "" ground truth. The k3s role
         template (roles/chatbot/templates/secret.yaml.j2) renders these bare
         (missing `| quote`), i.e. YAML null instead of "" -- functionally
         equivalent since Secret stringData is map[string]string, and moot
         once that role template is deleted. */}}
  BEDROCK_KNOWLEDGE_BASE_ID: {{ .Values.chatbot.secrets.bedrockKnowledgeBaseId | quote }}
  BEDROCK_MODEL_ID: {{ .Values.chatbot.secrets.bedrockModelId | quote }}
{{- end }}
