{{- if .Values.landing.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: {{ .Values.landing.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.landing.service.type | default "ClusterIP" }}
  selector:
    app: landing
  ports:
    - name: http
      port: {{ .Values.landing.service.port }}
      targetPort: 80
{{- end }}
