{{- if .Values.landing.enabled }}
{{- $l := .Values.landing }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: {{ $l.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
      annotations:
        # Roll the pod when the HTML changes.
        checksum/config: {{ include (print $.Template.BasePath "/landing/configmap.yaml") . | sha256sum }}
        checksum/nginx: {{ include (print $.Template.BasePath "/landing/nginx-config.yaml") . | sha256sum }}
    spec:
      {{- include "llm-stack.imagePullSecrets" $l | nindent 6 }}
      containers:
        - name: nginx
          image: {{ include "llm-stack.image" (dict "component" $l "global" .Values.global) }}
          imagePullPolicy: {{ $l.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: html
          configMap:
            name: landing-html
        - name: nginx-conf
          configMap:
            name: landing-nginx
{{- end }}
