{{- if .Values.landing.enabled }}
{{- $cb := .Values.chatbot }}
{{- $llm := .Values.llamacpp }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-nginx
  namespace: {{ .Values.landing.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      # Static landing page.
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      {{- if $cb.enabled }}
      # Chatbot — keep the {{ $cb.path }} prefix (Streamlit baseUrlPath). Websockets.
      location {{ $cb.path }}/ {
        proxy_pass http://{{ $cb.name }}.{{ $cb.namespace }}.svc.cluster.local:{{ $cb.service.port }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
      }
      {{- end }}

      {{- if $llm.enabled }}
      # LLM API — strip the {{ $llm.path }} prefix (llama-server expects /v1/...).
      location {{ $llm.path }}/ {
        proxy_pass http://llamacpp.{{ $llm.namespace }}.svc.cluster.local:{{ $llm.service.port }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
      }
      {{- end }}
    }
{{- end }}
