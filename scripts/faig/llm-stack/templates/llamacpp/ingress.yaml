{{- if and .Values.llamacpp.enabled .Values.llamacpp.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llamacpp
  namespace: {{ .Values.llamacpp.namespace }}
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.llamacpp.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.llamacpp.ingress.className }}
  rules:
    # No host: matches any Host header (hostname, raw IP, anything).
    - http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" .Values.llamacpp.ingress.path }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: llamacpp
                port:
                  number: {{ .Values.llamacpp.service.port }}
{{- end }}
